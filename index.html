<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字でGO!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #e0f2fe, #e0e7ff);
            font-family: 'M PLUS Rounded 1c', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            width: 95%;
            max-width: 600px;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 15px 0 #93c5fd, 0 25px 30px rgba(0,0,0,0.1);
            padding: 20px 25px 25px 25px;
            text-align: center;
            position: relative;
            border: 6px solid #2563eb;
        }

        h1 {
            color: #1e3a8a;
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 5px;
            text-shadow: 3px 3px 0 #dbeafe;
        }

        /* キャラクターエリア */
        #char-area {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            border: 3px dashed #3b82f6;
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 12px;
            height: 85px;
        }

        #char-sprite {
            font-size: 3rem;
            margin-right: 15px;
            animation: bounce 1s infinite alternate;
        }

        #char-bubble {
            background: white;
            border: 2px solid #3b82f6;
            border-radius: 15px;
            padding: 6px 12px;
            font-size: 0.9rem;
            color: #1e293b;
            position: relative;
            max-width: 70%;
            text-align: left;
        }

        #char-bubble::after {
            content: '';
            position: absolute;
            left: -10px;
            top: 50%;
            transform: translateY(-50%);
            border-width: 5px 10px 5px 0;
            border-style: solid;
            border-color: transparent #3b82f6 transparent transparent;
            display: block;
            width: 0;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-6px); }
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 1.1rem;
            background: #f1f5f9;
            padding: 8px 15px;
            border-radius: 15px;
            border: 3px solid #e2e8f0;
        }

        .hearts {
            color: #ef4444;
            font-size: 1.4rem;
            letter-spacing: 2px;
        }

        .score-box {
            color: #1e3a8a;
            font-weight: bold;
        }

        /* 漢字ステージ */
        #stage {
            height: 180px;
            background: #1e3a8a;
            border-radius: 20px;
            border: 4px solid #3b82f6;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
            perspective: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #kanji-display {
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.6), 3px 3px 0 #172554;
            transform: translateZ(0px);
            transition: transform 0.1s linear;
            display: inline-block;
            white-space: nowrap;
        }

        /* 制限時間バー */
        #timer-bar-container {
            width: 100%;
            height: 14px;
            background: #f1f5f9;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 2px solid #cbd5e1;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #3b82f6, #f59e0b, #ef4444);
            transition: width 0.1s linear;
        }

        /* 入力エリア */
        #input-box {
            width: 100%;
            padding: 12px 20px;
            font-size: 1.5rem;
            border: 4px solid #93c5fd;
            border-radius: 50px;
            text-align: center;
            outline: none;
            font-family: inherit;
            color: #1e3a8a;
            box-shadow: 0 6px 0 #93c5fd;
            transition: all 0.15s;
        }

        #input-box:focus {
            border-color: #3b82f6;
            box-shadow: 0 6px 0 #3b82f6;
        }

        /* 共通画面スタイル */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 25px;
        }

        #explanation-screen {
            background: #f0fdf4;
            border: 6px solid #22c55e;
        }

        .explanation-word {
            font-size: 2.2rem;
            color: #166534;
            margin: 0;
            font-weight: 900;
        }

        .explanation-reading {
            font-size: 1.2rem;
            color: #15803d;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .explanation-text {
            font-size: 1.1rem;
            color: #1e293b;
            background: white;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #bbf7d0;
            width: 100%;
            max-height: 140px;
            overflow-y: auto;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .count-bar-container {
            width: 80%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .count-bar {
            height: 100%;
            width: 100%;
            background: #22c55e;
            transition: width 0.1s linear;
        }

        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            font-family: inherit;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #1d4ed8;
            transition: all 0.1s;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #1d4ed8;
        }

        .difficulty-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-top: 15px;
        }

        .diff-btn {
            padding: 12px 6px;
            font-size: 1rem;
            font-weight: bold;
            border: 3px solid #cbd5e1;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            color: white;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            line-height: 1.3;
        }

        .diff-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.1);
        }

        .diff-easy { background: #60a5fa; border-color: #3b82f6; }
        .diff-normal { background: #3b82f6; border-color: #2563eb; }
        .diff-hard { background: #1d4ed8; border-color: #1e40af; }
        .diff-all { background: #ec4899; border-color: #db2777; }

        .hidden {
            display: none !important;
        }

        .grade-badge {
            font-size: 0.8rem;
            background: #3b82f6;
            color: white;
            padding: 3px 10px;
            border-radius: 10px;
            margin-top: 8px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="screen">
        <h1>漢字でGO! 🤖</h1>
        <p style="color: #334155; font-weight: bold; font-size: 0.8rem; margin: 3px 0;">
            実在する正しい日本語・熟語のみを厳選収録！<br>
            ※送り仮名は入力不要です。（例：「求める」は「もと」で正解）<br>
            ミスしたり時間切れになっても、解説でしっかり復習できるよ！
        </p>
        <p style="font-weight: bold; color: #3b82f6; margin: 5px 0; font-size: 0.9rem;">👇 モードを選んでスタート（全40問）！</p>
        <div class="difficulty-container">
            <button class="diff-btn diff-easy" onclick="startGame('easy')">小学校３〜４年<br><span style="font-size:0.8rem; font-weight:normal;">新出漢字：402字</span></button>
            <button class="diff-btn diff-normal" onclick="startGame('normal')">小学校５〜６年<br><span style="font-size:0.8rem; font-weight:normal;">新出漢字：384字</span></button>
            <button class="diff-btn diff-hard" onclick="startGame('hard')">中学校<br><span style="font-size:0.8rem; font-weight:normal;">新出漢字：1,110字</span></button>
            <button class="diff-btn diff-all" onclick="startGame('all')">全学年<br><span style="font-size:0.8rem; font-weight:normal;">新出漢字：2,136字</span></button>
        </div>
    </div>

    <div id="explanation-screen" class="screen hidden">
        <div id="exp-status" style="font-size: 1.3rem; font-weight: bold; margin-bottom: 5px;">🌟 せいかい！ 🌟</div>
        <h2 id="exp-word" class="explanation-word">太陽</h2>
        <div id="exp-reading" class="explanation-reading">たいよう</div>
        <div id="exp-text" class="explanation-text">説明が入ります。</div>
        
        <div class="count-bar-container">
            <div id="count-bar" class="count-bar"></div>
        </div>
        <div id="count-text" style="font-size: 0.8rem; color: #64748b; margin-bottom: 10px;">次の問題まであと 5 秒</div>
        <button id="skip-btn" class="btn" style="padding: 8px 25px; font-size: 1rem;">次へ進む ➔</button>
    </div>

    <div id="result-screen" class="screen hidden">
        <div id="char-result-emoji" style="font-size: 4rem; margin-bottom: 10px;">🤖🏆</div>
        <h2 id="result-title" style="font-size: 2.2rem; margin: 0; color: #ef4444;">GAME OVER</h2>
        <p id="result-score" style="font-size: 1.4rem; font-weight: bold; color: #1e293b; margin: 15px 0;"></p>
        <button id="retry-btn" class="btn">タイトルに戻る</button>
    </div>

    <div id="char-area">
        <div id="char-sprite">🤖</div>
        <div id="char-bubble">ピピッ！ぼくはタイピンくん！「漢字でGO!」いっしょにがんばろう！</div>
    </div>

    <div class="status-bar">
        <div class="score-box">問題: <span id="question-num">1</span>/40</div>
        <div class="hearts" id="heart-box">❤️❤️❤️❤️❤️</div>
    </div>

    <div id="stage">
        <div>
            <div id="kanji-display">漢字</div>
            <br>
            <div id="grade-info" class="grade-badge">小学3年</div>
        </div>
    </div>

    <div id="timer-bar-container">
        <div id="timer-bar"></div>
    </div>

    <input type="text" id="input-box" placeholder="ここに読みがなを入力" autocomplete="off" disabled>
</div>

<script>
    // --- データベース ---
    const kanjiDatabase = {

            { q: "太陽", a: "たいよう", short_a: "たいよう", exp: "地球に光と熱を届けてくれる、宇宙でいちばん身近な星（恒星）のこと。", g: "小3" },

            { q: "急行", a: "きゅうこう", short_a: "きゅうこう", exp: "普通の電車やバスよりも、途中の一部の駅を飛ばして目的地へ急いで行くこと。", g: "小3" },

    function playTone(freq, type, duration, volume = 0.1, delay = 0) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + delay);
        osc.stop(audioCtx.currentTime + delay + duration);
    }

    function playCorrectSE() {
        playTone(523.25, 'sine', 0.1, 0.1, 0);

        const charResultEmoji = document.getElementById("char-result-emoji");

        if (lives > 0) {
            resultTitle.textContent = "🎉 完全制覇！ 🎉";
            resultTitle.style.color = "#22c55e";
            charResultEmoji.textContent = "🤖👑";
            updateChar("clear", charSpeech.clear);
            playTone(523, 'sine', 0.15, 0.1, 0);
            playTone(659, 'sine', 0.15, 0.1, 0.1);
            playTone(784, 'sine', 0.15, 0.1, 0.2);
            playTone(1046, 'sine', 0.4, 0.1, 0.3);
        } else {
            resultTitle.textContent = "💥 GAME OVER 💥";
            resultTitle.style.color = "#ef4444";
            charResultEmoji.textContent = "🤖💔";
            updateChar("sad", charSpeech.over);
            playTone(150, 'sawtooth', 0.6, 0.2);
        }

        resultScore.textContent = `正解数: ${score} / ${quizList.length} 問`;
        resultScreen.classList.remove("hidden");
    }

    document.getElementById("retry-btn").addEventListener("click", () => {
        resultScreen.classList.add("hidden");
        startScreen.classList.remove("hidden");
    });
</script>
</body>
</html>
